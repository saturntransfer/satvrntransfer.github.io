<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATVRN P2P | 1kritsu</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root { 
            --purple: #a855f7;
            --blue: #3b82f6;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body { 
            background: var(--bg-dark);
            color: white; 
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh; 
            overflow-x: hidden; 
            overflow-y: auto; 
            perspective: 2000px;
        }

        .bg-fixed-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .bg-gradient {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.15), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15), transparent 40%),
                        linear-gradient(135deg, #050505 0%, #11081a 100%);
        }

        #mouse-glow { 
            position: fixed; 
            top: 0; left: 0;
            width: 600px; height: 600px; 
            background: radial-gradient(circle, rgba(168, 85, 247, 0.12), transparent 70%); 
            border-radius: 50%; z-index: 1; 
            transform: translate(-50%, -50%); mix-blend-mode: screen; 
            pointer-events: none;
        }

        #canvas-particles { 
            position: absolute; 
            top: 0; 
            left: 0; 
            opacity: 1; /* Cząsteczki w pełni widoczne */
        }

        #stage { 
            position: relative;
            min-height: 100vh;
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.2, 1, 0.2, 1);
            transform-style: preserve-3d;
            padding: 60px 20px;
            z-index: 2;
        }

        #stage.active { justify-content: flex-start; }

        h1 { 
            font-size: clamp(3.5rem, 10vw, 7rem); 
            font-weight: 900; 
            letter-spacing: -4px; 
            background: linear-gradient(to bottom, #ffffff 40%, rgba(255,255,255,0.4)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            transform: translateZ(60px);
        }

        #stage.active h1 { font-size: clamp(2.5rem, 6vw, 3.5rem); }

        .qr-hero {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            padding: 50px;
            border-radius: 60px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform: translateZ(100px);
            transition: 0.8s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .qr-hero.hidden {
            opacity: 0; 
            transform: translateZ(-300px) scale(0.6);
            pointer-events: none; 
            position: absolute;
        }

        #qrcode { 
            background: #fff; padding: 15px; border-radius: 30px; 
            display: inline-block; margin-bottom: 25px;
            box-shadow: 0 20px 50px rgba(168, 85, 247, 0.3);
        }

        #file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1300px;
            opacity: 0; 
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.2, 1, 0.2, 1);
            margin-top: 20px;
        }

        #stage.active #file-grid { opacity: 1; transform: translateY(0); }

        .file-tile {
            background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            padding: 30px 20px; 
            border-radius: 40px;
            text-align: center;
            transition: 0.4s;
        }
        
        .file-tile:hover { border-color: var(--purple); transform: translateY(-5px); }
        .file-icon { width: 70px; height: 70px; margin-bottom: 15px; }
        .file-name { font-size: 0.9rem; font-weight: 600; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-size { font-size: 0.75rem; color: #666; margin-bottom: 15px; }

        .dl-btn {
            background: linear-gradient(135deg, var(--purple), var(--blue));
            border: none; color: white; padding: 12px; border-radius: 18px;
            font-weight: 800; font-size: 0.7rem; cursor: pointer;
            width: 100%; text-transform: uppercase;
            transition: 0.3s;
        }
        .dl-btn:hover { filter: brightness(1.2); box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body>
    
    <div class="bg-fixed-elements">
        <div class="bg-gradient"></div>
        <canvas id="canvas-particles"></canvas>
        <div id="mouse-glow"></div>
    </div>

    <div id="stage">
        <h1 id="main-title">SATVRN (GLOBAL)</h1>
        
        <div class="qr-hero" id="hero-panel">
            <div id="qrcode"></div>
            <p style="font-weight: 700; letter-spacing: 2px; color: #666; font-size: 0.7rem; text-transform: uppercase;">Zeskanuj aby połączyć P2P</p>
        </div>

        <div id="file-grid"></div>
    </div>

    <script>
        const socket = io();
        const stage = document.getElementById('stage'), 
              hero = document.getElementById('hero-panel'), 
              grid = document.getElementById('file-grid'),
              glow = document.getElementById('mouse-glow');

        // LOGIKA P2P (PEERJS)
        const peer = new Peer();

        peer.on('open', (id) => {
            const p2pUrl = window.location.origin + "/mobile?peerId=" + id;
            new QRCode(document.getElementById("qrcode"), { 
                text: p2pUrl, 
                width: 200, height: 200
            });
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.type === 'file') {
                    const blob = new Blob([data.file]);
                    const url = URL.createObjectURL(blob);
                    
                    // DODANIE KAFELKA (bez automatycznego pobierania)
                    const tile = document.createElement('div');
                    tile.className = 'file-tile';
                    tile.innerHTML = `
                        <img src="${getIcon(data.filename)}" class="file-icon">
                        <div class="file-name">${data.filename}</div>
                        <div class="file-size">${data.size}</div>
                        <a href="${url}" download="${data.filename}" style="text-decoration:none;">
                            <button class="dl-btn">Pobierz</button>
                        </a>
                    `;
                    grid.insertBefore(tile, grid.firstChild);
                }
            });
        });

        function getIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = { pdf: "pdf.png", jpg: "image.png", png: "image.png", mp4: "video.png", zip: "zip.png" };
            return "https://img.icons8.com/fluency/96/" + (icons[ext] || "file.png");
        }

        socket.on('device_connected', () => {
            hero.classList.add('hidden');
            stage.classList.add('active');
        });

        // EFEKTY MYSZY
        document.addEventListener('mousemove', (e) => {
            glow.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
            const mx = (e.clientX - window.innerWidth / 2) / 100;
            const my = (e.clientY - window.innerHeight / 2) / 100;
            stage.style.transform = `rotateX(${-my}deg) rotateY(${mx}deg)`;
        });

        // POPRAWIONE CZĄSTECZKI (#FFFFFF + Glow)
        const canvas = document.getElementById('canvas-particles'), ctx = canvas.getContext('2d');
        function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = res; res();
        
        let pts = Array.from({length: 80}, () => ({ 
            x: Math.random()*canvas.width, 
            y: Math.random()*canvas.height, 
            v: Math.random()*0.5+0.5, 
            p: Math.random()*Math.PI*2 
        }));

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pts.forEach(p => {
                p.y += p.v; 
                p.p += 0.02;
                if(p.y > canvas.height) p.y = -10;

                ctx.fillStyle = "#FFFFFF"; 
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#FFFFFF";

                ctx.beginPath(); 
                ctx.arc(p.x + Math.sin(p.p) * 15, p.y, 1.3, 0, Math.PI * 2); 
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
