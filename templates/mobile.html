<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SATVRN MOBILE | P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background: #030303; color: white; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 40px 20px; border-radius: 40px; width: 85%; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { font-weight: 900; background: linear-gradient(to bottom, #fff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; letter-spacing: -1px; }
        .upload-area { border: 2px dashed rgba(168, 85, 247, 0.4); border-radius: 30px; padding: 50px 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .upload-area:active { transform: scale(0.98); background: rgba(168, 85, 247, 0.05); }
        .progress-bar { width: 0%; height: 5px; background: #a855f7; position: absolute; bottom: 0; left: 0; border-radius: 0 0 30px 30px; transition: 0.3s; box-shadow: 0 -5px 15px rgba(168, 85, 247, 0.5); }
        #st { margin-top: 25px; font-size: 0.7rem; color: #666; letter-spacing: 2px; text-transform: uppercase; }
        input { display: none; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>SATVRN P2P</h2>
        <div class="upload-area" onclick="document.getElementById('f').click()">
            <div style="font-size: 3.5rem; margin-bottom: 10px;">📤</div>
            <div style="font-weight: 600; font-size: 1.1rem;">Wyślij do PC</div>
            <div id="pb" class="progress-bar"></div>
        </div>
        <input type="file" id="f" multiple>
        <div id="st">Inicjalizacja połączenia...</div>
    </div>

    <script>
        const status = document.getElementById('st'), pb = document.getElementById('pb'), fileInput = document.getElementById('f');
        const targetId = new URLSearchParams(window.location.search).get('peerId');
        
        const peer = new Peer();
        let conn;

        peer.on('open', () => {
            if (targetId) {
                conn = peer.connect(targetId);
                conn.on('open', () => { 
                    status.innerText = "POŁĄCZONO P2P Z PC"; 
                    status.style.color = "#a855f7";
                });
                conn.on('error', () => { status.innerText = "BŁĄD POŁĄCZENIA"; });
            }
        });

        fileInput.onchange = async function() {
            if (!conn) return;
            const files = this.files;
            
            for(let i=0; i < files.length; i++) {
                const f = files[i];
                status.innerText = `Przesyłanie: ${f.name}`;
                
                const reader = new FileReader();
                reader.onload = () => {
                    conn.send({ 
                        type: 'file', 
                        file: reader.result, 
                        filename: f.name, 
                        size: (f.size/1024).toFixed(1) + " KB" 
                    });
                    
                    let progress = ((i + 1) / files.length) * 100;
                    pb.style.width = progress + "%";
                    
                    if(i === files.length - 1) {
                        status.innerText = "WYSŁANO POMYŚLNIE";
                        setTimeout(() => { 
                            pb.style.width = "0%"; 
                            status.innerText = "POŁĄCZONO P2P Z PC"; 
                        }, 3000);
                    }
                };
                reader.readAsArrayBuffer(f);
            }
        };
    </script>
</body>
</html>
