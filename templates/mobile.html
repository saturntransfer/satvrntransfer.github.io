<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Core Mobile P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .btn { background: #a855f7; padding: 25px 50px; border-radius: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(168,85,247,0.3); }
        #status { margin-top: 20px; font-size: 0.8rem; color: #888; text-align: center; }
        input { display: none; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="btn" id="sendBtn">WYBIERZ PLIK P2P</div>
        <input type="file" id="fileInput">
        <div id="status">Łączenie z PC...</div>
    </div>

    <script>
        const status = document.getElementById('status');
        const fileInput = document.getElementById('fileInput');
        const sendBtn = document.getElementById('sendBtn');
        
        const urlParams = new URLSearchParams(window.location.search);
        const targetPeerId = urlParams.get('peerId');

        const peer = new Peer();
        let conn;

        peer.on('open', () => {
            if (targetPeerId) {
                conn = peer.connect(targetPeerId);
                conn.on('open', () => {
                    status.innerText = "POŁĄCZONO P2P Z PC";
                });
                conn.on('error', () => {
                    status.innerText = "BŁĄD POŁĄCZENIA";
                });
            }
        });

        sendBtn.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file || !conn) return;

            status.innerText = "SZYFROWANIE I WYSYŁANIE...";
            
            const reader = new FileReader();
            reader.onload = () => {
                conn.send({
                    type: 'file',
                    file: reader.result,
                    name: file.name,
                    size: (file.size / 1024).toFixed(2) + " KB"
                });
                status.innerText = "WYSŁANO POMYŚLNIE!";
                setTimeout(() => { status.innerText = "POŁĄCZONO P2P Z PC"; }, 3000);
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
